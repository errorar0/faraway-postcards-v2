<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Film Strip Menu</title>

<style>
  /* ---------- RESET ---------- */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,
  body {
    height: 100%;
    overflow-x: hidden;

    background: #f5f1ea;
    color: #2a2520;

    font-family: Georgia, "Times New Roman", serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- HEADER ---------- */
  .site-header {
    position: relative;

    display: flex;
    align-items: center;
    justify-content: center;

    padding: 22px 24px;

    background: #1a1613;
    border-bottom: 1px solid #2a2520;

    z-index: 10;
  }

  .site-title {
    color: #ede6d6;

    font-size: 1.2rem;
    font-weight: 400;

    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* ---------- HAMBURGER ---------- */
  .hamburger {
    position: absolute;

    left: 20px;
    top: 50%;

    transform: translateY(-50%);

    width: 38px;
    height: 38px;

    border: none;
    background: transparent;

    cursor: pointer;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;

    padding: 0;
  }

  .hamburger span {
    width: 22px;
    height: 1.5px;

    background: #ede6d6;

    transition: 0.3s ease;
  }

  .hamburger:hover span {
    background: white;
  }

  /* ---------- DEMO CONTENT ---------- */
  .page-content {
    max-width: 720px;

    margin: 0 auto;
    padding: 70px 24px;

    text-align: center;
  }

  .page-content h1 {
    margin-bottom: 18px;

    font-size: 1.4rem;
    font-weight: 400;

    letter-spacing: 0.08em;
  }

  .page-content p {
    color: #5a4f44;

    line-height: 1.7;
    font-size: 0.95rem;
  }

  /* ---------- OVERLAY ---------- */
  .menu-overlay {
    position: fixed;
    inset: 0;

    background: rgba(20, 16, 13, 0.55);

    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);

    opacity: 0;
    pointer-events: none;

    transition: opacity 0.4s ease;

    z-index: 50;
  }

  .menu-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ---------- FILM STRIP ---------- */
  .film-strip {
    position: fixed;

    top: 0;
    left: 20px;

    transform: scaleY(0);
    transform-origin: top left;

    width: 340px;

    background: #0e0b09;

    z-index: 100;

    transition: transform 0.55s cubic-bezier(0.22, 0.61, 0.36, 1);

    box-shadow:
      0 0 0 1px #0a0807,
      0 20px 60px rgba(0, 0, 0, 0.5);

    background-image:
      linear-gradient(
        180deg,
        #0e0b09 0%,
        #110d0a 50%,
        #0e0b09 100%
      );
  }

  .film-strip.active {
    transform: scaleY(1);
  }

  /* ---------- SPROCKETS ---------- */
  .sprocket-column {
    position: absolute;

    top: 0;
    bottom: 0;

    width: 32px;

    display: flex;
    flex-direction: column;
    justify-content: space-around;

    padding: 14px 0;

    pointer-events: none;
  }

  .sprocket-column.left {
    left: 0;
  }

  .sprocket-column.right {
    right: 0;
  }

  .sprocket {
    width: 14px;
    height: 9px;

    margin: 0 auto;

    border-radius: 1.5px;

    background: #f5f1ea;

    box-shadow: inset 0 0 2px rgba(0,0,0,0.4);
  }

  /* ---------- INNER ---------- */
  .film-strip-inner {
    padding: 36px 50px 28px;

    display: flex;
    flex-direction: column;
    align-items: center;

    opacity: 0;

    transition: opacity 0.4s ease 0.25s;
  }

  .film-strip.active .film-strip-inner {
    opacity: 1;
  }

  /* ---------- MENU ---------- */
  .menu-items {
    width: 100%;

    list-style: none;

    margin: 10px 0 20px;
  }

  .menu-items li {
    margin-bottom: 12px;
  }

  .menu-items a {
    display: block;

    padding: 18px 10px;

    background: #ede6d6;
    color: #1a1613;

    text-decoration: none;
    text-align: center;

    border: 1px solid #c8bfae;

    font-size: 0.9rem;

    letter-spacing: 0.18em;
    text-transform: uppercase;

    transition:
      transform 0.3s ease,
      background 0.3s ease,
      letter-spacing 0.3s ease;

    box-shadow:
      inset 0 0 18px rgba(0,0,0,0.12),
      0 4px 12px rgba(0,0,0,0.18);
  }

  .menu-items a:hover {
    background: #fff7df;

    transform: scale(1.03);

    letter-spacing: 0.24em;
  }

  /* ---------- CLOSE ---------- */
  .menu-close {
    border: 1px solid #4a3f36;
    background: transparent;

    color: #ede6d6;

    padding: 8px 18px;

    cursor: pointer;

    font-size: 0.7rem;

    letter-spacing: 0.25em;
    text-transform: uppercase;

    transition: 0.3s ease;
  }

  .menu-close:hover {
    background: #ede6d6;
    color: #1a1613;
    border-color: #ede6d6;
  }

  /* ---------- MOBILE ---------- */
  @media (max-width: 480px) {

    .film-strip {
      left: 12px;

      width: calc(100vw - 24px);
      max-width: 340px;
    }

    .film-strip-inner {
      padding: 30px 44px 24px;
    }

    .menu-items a {
      font-size: 0.82rem;
    }

    .site-title {
      font-size: 1rem;
    }
  }

  /* ---------- REDUCED MOTION ---------- */
  @media (prefers-reduced-motion: reduce) {

    .film-strip,
    .menu-overlay,
    .film-strip-inner {
      transition: opacity 0.2s ease;
    }

    .film-strip {
      transform: scaleY(1);

      opacity: 0;
      pointer-events: none;
    }

    .film-strip.active {
      opacity: 1;
      pointer-events: auto;
    }
  }

</style>
</head>

<body>

<!-- HEADER -->
<header class="site-header">

  <button
    class="hamburger"
    id="hamburgerBtn"
    aria-label="Open menu"
    aria-expanded="false"
    aria-controls="filmMenu"
  >
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div class="site-title">
    Faraway Postcards
  </div>

</header>

<!-- CONTENT -->
<main class="page-content">

  <h1>Film Strip Menu</h1>

  <p>
    Cinematic dropdown navigation inspired by vintage film photography.
  </p>

</main>

<!-- OVERLAY -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- MENU -->
<nav
  class="film-strip"
  id="filmMenu"
  role="dialog"
  aria-modal="true"
  aria-label="Main navigation"
>

  <!-- LEFT SPROCKETS -->
  <div class="sprocket-column left" aria-hidden="true">
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
  </div>

  <!-- RIGHT SPROCKETS -->
  <div class="sprocket-column right" aria-hidden="true">
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
    <div class="sprocket"></div>
  </div>

  <!-- INNER -->
  <div class="film-strip-inner">

    <ul class="menu-items">

      <li>
        <a href="#">Home</a>
      </li>

      <li>
        <a href="#">About</a>
      </li>

      <li>
        <a href="#">Destination</a>
      </li>

      <li>
        <a href="#">Experience</a>
      </li>

    </ul>

    <button
      class="menu-close"
      id="menuCloseBtn"
      aria-label="Close menu"
    >
      Close
    </button>

  </div>

</nav>

<script>
(function () {

  'use strict';

  const hamburger =
    document.getElementById('hamburgerBtn');

  const filmMenu =
    document.getElementById('filmMenu');

  const overlay =
    document.getElementById('menuOverlay');

  const closeBtn =
    document.getElementById('menuCloseBtn');

  function openMenu() {

    filmMenu.classList.add('active');

    overlay.classList.add('active');

    hamburger.setAttribute(
      'aria-expanded',
      'true'
    );

    document.body.style.overflow = 'hidden';
  }

  function closeMenu() {

    filmMenu.classList.remove('active');

    overlay.classList.remove('active');

    hamburger.setAttribute(
      'aria-expanded',
      'false'
    );

    document.body.style.overflow = '';
  }

  hamburger.addEventListener(
    'click',
    function (e) {

      e.stopPropagation();

      if (
        filmMenu.classList.contains('active')
      ) {
        closeMenu();
      } else {
        openMenu();
      }
    }
  );

  closeBtn.addEventListener(
    'click',
    closeMenu
  );

  overlay.addEventListener(
    'click',
    closeMenu
  );

  document.addEventListener(
    'keydown',
    function (e) {

      if (
        e.key === 'Escape' &&
        filmMenu.classList.contains('active')
      ) {
        closeMenu();
      }
    }
  );

})();
</script>

</body>
</html>
