        <p class="eyebrow">Armenia · Architecture</p>
        <h1>The Volcanic Architecture of Armenia</h1>
        <p class="article__lede">In Armenia, architecture does not feel separated from the landscape. It feels extracted from it.</p>
      </header>

      <section class="article__body">

        <p>Churches rise from black cliffs using the same volcanic stone as the mountains behind them. Entire cities appear carved from ash-colored rock. Monasteries seem less constructed than fused into canyons, caves, and plateaus shaped by tectonic violence millions of years before Christianity arrived.</p>

        <p>This is what makes Armenia architecturally unusual.</p>

        <p>Not simply age.<br />
        Not religion.<br />
        Material.</p>

        <p>The country sits on a volcanic highland where basalt, tuff, and dark lava stone have shaped architecture for centuries. In many places, the buildings do not contrast with the terrain the way European architecture often does.</p>

        <p>They dissolve into it.</p>

        <h2>Yerevan: The City Built From Volcanic Light</h2>

        <p>At first glance, Yerevan does not look volcanic.</p>

        <p>The city glows pink at sunset. Cafés spill into wide boulevards. Soviet avenues open toward views of Mount Ararat in the distance.</p>

        <p>But nearly everything in central Yerevan is built from volcanic tuff.</p>

        <p>The stone changes color depending on light: dusty rose in the evening, pale gold at noon, gray during winter rain. Entire apartment blocks, government buildings, staircases, and arches seem to absorb sunlight rather than reflect it.</p>

        <p>Unlike concrete or polished marble, volcanic tuff carries softness and erosion visibly on its surface. Corners wear down. Texture deepens. Buildings age physically instead of remaining visually frozen.</p>

        <p>Even modern Armenia often looks ancient because the stone itself already feels geological.</p>

        <figure class="article__figure">
<img src="../images/yerevan_armenia.jpeg"
          <figcaption>Volcanic tuff in central Yerevan — soft, porous, and quietly changing color through the day.</figcaption>
        </figure>

        <h2>Geghard: Architecture Carved Into the Mountain</h2>

        <p>Nowhere explains Armenia's volcanic architecture more clearly than Geghard Monastery.</p>

        <p>Parts of the monastery are not constructed beside the mountain.<br />
        They are carved directly inside it.</p>

        <p>The deeper chambers disappear into black volcanic rock where candlelight barely reaches the walls. Water drips slowly through the stone ceiling into medieval basins polished by centuries of hands. The air smells damp and mineral-heavy.</p>

        <p>It becomes difficult to understand where architecture ends and geology begins.</p>

        <p>This is one of the reasons architects find Armenia so fascinating.</p>

        <p>Much of European religious architecture imposes itself onto the landscape.<br />
        Geghard feels excavated from it.</p>

        <p>The monastery does not dominate the canyon.<br />
        It belongs to it.</p>

        <figure class="article__figure">
<img src="../images/mount_ararat.jpeg"
          <figcaption>The line between mountain and monastery becomes difficult to draw.</figcaption>
        </figure>

        <h2>Garni and the Basalt Geometry of the Canyon</h2>

        <p>Near Garni Temple, the landscape itself begins resembling architecture.</p>

        <p>Below the pagan temple, the Garni Gorge is lined with enormous basalt columns formed by ancient lava flows. The formations rise vertically from the canyon walls in near-perfect hexagonal patterns, often called the “Symphony of Stones.”</p>

        <p>From a distance, the cliffs resemble giant organ pipes or unfinished brutalist architecture.</p>

        <p>The effect is strangely modern despite being entirely geological.</p>
